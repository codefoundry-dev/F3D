services:
  postgres:
    image: postgres:16-alpine
    container_name: forethread-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forethread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD for staging}
      POSTGRES_DB: ${POSTGRES_DB:-forethread}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-forethread} -d ${POSTGRES_DB:-forethread}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: forethread-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: forethread-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025']
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API (build once, runs migrations + seed + app)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: forethread-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      FORETHREAD_ENV: staging
      # Public base URL of this backend (matches Caddyfile.staging). Override per host.
      APP_URL: ${APP_URL:-https://api-stage.forethread.com}
      # Deployed frontend origin — used to build email/portal links. No safe
      # default for staging, so it must be supplied.
      WEB_APP_URL: ${WEB_APP_URL:?set the deployed staging frontend URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-forethread}:${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD for staging}@postgres:5432/${POSTGRES_DB:-forethread}
      DATABASE_CONNECTION_LIMIT: ${DATABASE_CONNECTION_LIMIT:-10}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-10}
      REDIS_URL: redis://redis:6379
      # Auth secrets — no insecure defaults; generate with `openssl rand -hex 32`.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET (>=32 chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET (>=32 chars)}
      JWT_ACCESS_EXPIRES_IN: 4h
      JWT_REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM: noreply@forethread.local
      # Resend — preferred transport. When RESEND_API_KEY is set, all outbound
      # email sends via Resend and the SMTP/Mailhog settings above are ignored.
      # Leave unset to fall back to Mailhog. Provide via shell env or root .env.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-notifications@updates.forethread.com}
      # Resend delivery-event webhook signing secret (whsec_…). Leave unset to
      # accept unsigned webhook calls; set it to enforce Svix signature checks.
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      # Retry tuning for transient Resend failures (rate limits / upstream blips).
      RESEND_MAX_RETRIES: ${RESEND_MAX_RETRIES:-3}
      RESEND_RETRY_BASE_MS: ${RESEND_RETRY_BASE_MS:-500}
      CORS_ORIGINS: ${CORS_ORIGINS:?set allowed staging frontend origin(s)}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # --- Observability ---
      SENTRY_DSN: ${SENTRY_DSN:-}
      # --- Rate limiting ---
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      # --- Google Places (address autocomplete) + Gemini (document intelligence) ---
      # API keys are optional at boot; the dependent features fail at call time if unset.
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-180000}
      GEMINI_THINKING_BUDGET: ${GEMINI_THINKING_BUDGET:-0}
      # --- Object storage: AWS S3 (replaces the former local MinIO container) ---
      # The backend talks to a real AWS S3 bucket via @aws-sdk/client-s3. On the
      # EC2 host the instance IAM role supplies credentials automatically, so
      # S3_ENDPOINT and S3_ACCESS_KEY/S3_SECRET_KEY are intentionally left UNSET
      # (see apps/backend/src/modules/storage/storage.service.ts). The bucket is
      # provisioned by infrastructure/modules/storage-s3 as forethread-<env>-uploads.
      # Running this compose off-EC2? Export AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
      # (and AWS_SESSION_TOKEN for temporary creds) in your shell; they are passed
      # through below for the AWS SDK default credential chain.
      S3_BUCKET: ${S3_BUCKET:-forethread-staging-uploads}
      S3_REGION: ${S3_REGION:-eu-north-1}
      S3_FORCE_PATH_STYLE: 'false'
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['full']

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.staging:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
