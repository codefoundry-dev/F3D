<p style="font-size:20px;font-weight:500;line-height:1.4;color:#000;margin:0;">
  {{t.greeting}}
</p>
<p style="font-size:20px;font-weight:500;line-height:1.4;color:#000;margin:0 0 16px;">
  {{t.heading}}
</p>
<p style="font-size:14px;line-height:1.5;color:#000;margin:0 0 24px;">
  {{t.body}}
</p>
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 24px;">
  <tr>
    <td align="center">
      <div style="background:#f5f5f5;border-radius:12px;padding:20px 24px;display:inline-block;">
        <span style="font-family:'Inter',system-ui,sans-serif;font-size:32px;font-weight:700;letter-spacing:6px;color:#131313;">{{code}}</span>
      </div>
    </td>
  </tr>
</table>
<p style="font-size:14px;line-height:1.5;color:#000;margin:0 0 8px;">
  {{{t.expiry}}}
</p>
<p style="font-size:14px;line-height:1.5;color:#000;margin:0;">
  {{t.ignore}}
</p>
