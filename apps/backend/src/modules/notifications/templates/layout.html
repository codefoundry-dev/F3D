<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--[if mso]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
  </style>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">
          <!-- Content -->
          <tr>
            <td style="padding:0 0 40px;">
              {{{content}}}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="border-top:1px solid #efefef;padding:24px 0 0;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto;">
                <tr>
                  <td>
                    <a href="https://forethread.com/privacy" target="_blank"
                       style="font-family:'Inter',system-ui,sans-serif;font-size:18px;font-weight:500;color:#131313;text-decoration:underline;">
                      {{footer.privacyPolicy}}
                    </a>
                  </td>
                  <td style="padding:0 12px;font-family:'Inter',system-ui,sans-serif;font-size:18px;color:#131313;">
                    {{footer.and}}
                  </td>
                  <td>
                    <a href="https://forethread.com/terms" target="_blank"
                       style="font-family:'Inter',system-ui,sans-serif;font-size:18px;font-weight:500;color:#131313;text-decoration:underline;">
                      {{footer.termsOfService}}
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
