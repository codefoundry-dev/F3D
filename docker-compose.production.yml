services:
  postgres:
    image: postgres:16-alpine
    container_name: forethread-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forethread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD for production}
      POSTGRES_DB: ${POSTGRES_DB:-forethread}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-forethread} -d ${POSTGRES_DB:-forethread}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: forethread-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: forethread-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025']
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API (build once, runs migrations + seed + app)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: forethread-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      # Public base URL of this backend (matches Caddyfile.production). Override per host.
      APP_URL: ${APP_URL:-https://api.forethread.com}
      # Deployed frontend origin — used to build email/portal links.
      WEB_APP_URL: ${WEB_APP_URL:-https://forethread-main.vercel.app}
      DATABASE_URL: postgresql://${POSTGRES_USER:-forethread}:${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD for production}@postgres:5432/${POSTGRES_DB:-forethread}
      REDIS_URL: redis://redis:6379
      # Auth secrets — no insecure defaults; generate with `openssl rand -hex 32`.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET (>=32 chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET (>=32 chars)}
      JWT_ACCESS_EXPIRES_IN: 4h
      JWT_REFRESH_EXPIRES_IN: 7d
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM: noreply@forethread.local
      # Resend — preferred transport. When RESEND_API_KEY is set, all outbound
      # email sends via Resend and the SMTP/Mailhog settings above are ignored.
      # Leave unset to fall back to Mailhog. Provide via shell env or root .env.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-noreply@forethread.local}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://forethread-main.vercel.app}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # --- Object storage: AWS S3 (replaces the former local MinIO container) ---
      # The backend talks to a real AWS S3 bucket via @aws-sdk/client-s3. On the
      # EC2 host the instance IAM role supplies credentials automatically, so
      # S3_ENDPOINT and S3_ACCESS_KEY/S3_SECRET_KEY are intentionally left UNSET
      # (see apps/backend/src/modules/storage/storage.service.ts). The bucket is
      # provisioned by infrastructure/modules/storage-s3 as forethread-<env>-uploads.
      # Running this compose off-EC2? Export AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
      # (and AWS_SESSION_TOKEN for temporary creds) in your shell; they are passed
      # through below for the AWS SDK default credential chain.
      S3_BUCKET: ${S3_BUCKET:-forethread-prod-uploads}
      S3_REGION: ${S3_REGION:-eu-north-1}
      S3_FORCE_PATH_STYLE: 'false'
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['full']

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
